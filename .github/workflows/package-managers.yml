name: Package managers

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to package (e.g. v0.1.0). Does NOT publish to crates.io."
        required: true

permissions:
  contents: read

jobs:
  meta:
    name: Resolve version
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RUN_TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$RUN_TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  crates-io:
    name: Publish to crates.io
    needs: meta
    if: ${{ github.event_name == 'workflow_run' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  aur:
    name: Publish to the AUR (${{ matrix.pkg }})
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pkg: [nsql, nsql-bin]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Stamp pkgver
        env:
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" \
            "packaging/aur/${{ matrix.pkg }}/PKGBUILD"
      - name: Deploy ${{ matrix.pkg }}
        uses: KSXGitHub/github-actions-deploy-aur@v4.2.0
        with:
          pkgname: ${{ matrix.pkg }}
          pkgbuild: packaging/aur/${{ matrix.pkg }}/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.meta.outputs.version }}"
          updpkgsums: true
          ssh_keyscan_types: rsa,ed25519

  debian-apt:
    name: Build .deb and publish signed apt repo
    needs: meta
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.tag }}
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config reprepro gnupg
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deb
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deb
      - name: Build .deb
        run: cargo deb
      - name: Fetch existing apt repo state (gh-pages)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git clone --branch gh-pages --single-branch \
               "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" public 2>/dev/null; then
            rm -rf public/.git
          else
            echo "gh-pages does not exist yet; starting a fresh repo"
            mkdir -p public
          fi
      - name: Sign and update apt repository
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          export GNUPGHOME="$HOME/.gnupg"
          mkdir -p "$GNUPGHOME"; chmod 700 "$GNUPGHOME"
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\ndefault-cache-ttl 3600\nmax-cache-ttl 3600\n' > "$GNUPGHOME/gpg-agent.conf"
          printf 'pinentry-mode loopback\n' > "$GNUPGHOME/gpg.conf"
          gpgconf --kill gpg-agent || true
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          preset="$(gpgconf --list-dirs libexecdir)/gpg-preset-passphrase"
          for grip in $(gpg --batch --with-colons --with-keygrip --list-secret-keys "$APT_GPG_KEY_ID" | awk -F: '/^grp:/{print $10}'); do
            echo "$APT_GPG_PASSPHRASE" | "$preset" --preset "$grip"
          done
          mkdir -p public/deb/conf
          sed "s/__APT_GPG_KEY_ID__/${APT_GPG_KEY_ID}/" \
            packaging/apt/conf/distributions > public/deb/conf/distributions
          # Re-runs of an already-published version would fail on the checksum
          # mismatch of a rebuilt .deb; skip includedeb if the version is present.
          if reprepro -b public/deb list stable nsql 2>/dev/null | grep -qE "nsql ${VERSION}(-|$)"; then
            echo "nsql ${VERSION} already in the apt repo; skipping includedeb"
          else
            reprepro -b public/deb includedeb stable target/debian/*.deb
          fi
          gpg --armor --export "${APT_GPG_KEY_ID}" > public/deb/nsql-archive-keyring.asc
          cp packaging/apt/index.html public/index.html
      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "apt: nsql ${{ needs.meta.outputs.version }}"

  homebrew-linux-dep:
    name: Declare libdbus dep in Homebrew formula (Linux)
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: Patch tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          f=""
          for i in 1 2 3 4 5 6; do
            rm -rf tap
            if git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/fredrir/homebrew-nsql.git" tap 2>/dev/null; then
              [ -f tap/Formula/nsql.rb ] && f=tap/Formula/nsql.rb
              [ -z "$f" ] && [ -f tap/nsql.rb ] && f=tap/nsql.rb
              [ -n "$f" ] && break
            fi
            echo "formula not available yet (attempt $i); waiting..."
            sleep 15
          done
          if [ -z "$f" ]; then
            echo "::error::Homebrew formula not found in tap after retries"; exit 1
          fi
          if grep -q 'depends_on "dbus"' "$f"; then
            echo "dbus dependency already present; nothing to do"; exit 0
          fi
          awk '/< *Formula/ && !d {print; print "  depends_on \"dbus\" if OS.linux?"; d=1; next} 1' "$f" > "$f.tmp"
          mv -f "$f.tmp" "$f"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "nsql ${{ needs.meta.outputs.version }}: depend on dbus on Linux"
          git push

name: Auto release

on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "**.md"
      - "assets/**"
      - "LICENSE"
  # Manual escape hatch: cut a release for commits that only touch ignored paths.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  tag:
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify RELEASE_TOKEN
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::RELEASE_TOKEN secret is missing."
            exit 1
          fi
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - id: v
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          cargo_v=$(sed -nE '0,/^version = "([0-9]+\.[0-9]+\.[0-9]+)"/s//\1/p' Cargo.toml)
          if [ -z "$latest" ]; then
            next="$cargo_v"
          else
            v=${latest#v}
            major=${v%%.*}; rest=${v#*.}; minor=${rest%%.*}; patch=${rest##*.}
            next="$major.$minor.$((patch+1))"
            # A manual bump in Cargo.toml beyond the computed patch wins
            # (e.g. someone set 0.2.0 while the latest tag is v0.1.2).
            if ! git rev-parse "v$cargo_v" >/dev/null 2>&1 && \
               [ "$(printf '%s\n%s\n' "$next" "$cargo_v" | sort -V | tail -n1)" = "$cargo_v" ]; then
              next="$cargo_v"
            fi
          fi
          echo "next=$next" >> "$GITHUB_OUTPUT"
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - run: |
          set -euo pipefail
          next='${{ steps.v.outputs.next }}'
          if git rev-parse "v$next" >/dev/null 2>&1; then
            echo "v$next already exists; nothing to do"
            exit 0
          fi
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$next\"/" Cargo.toml
          awk -v ver="$next" 'BEGIN{f=0} /^name = "nsql"$/{f=1} f && /^version = /{sub(/"[^"]*"/,"\"" ver "\"");f=0} {print}' Cargo.lock > Cargo.lock.new
          mv -f Cargo.lock.new Cargo.lock
          git-cliff --tag "v$next" -o CHANGELOG.md \
            || echo "::warning::git-cliff failed; release notes fall back to the auto-generated body"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "release: v$next"
            git push origin HEAD:main
          fi
          git tag -a "v$next" -m "v$next"
          git push origin "v$next"
